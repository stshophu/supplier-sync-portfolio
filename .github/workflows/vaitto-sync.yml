name: Supplier → Vaitto (EU-WAR-3)

on:
  schedule:
    - cron: '40 * * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r requirements.txt
      - name: Run sync
        env:
          SUPPLIER_PRICE_FEED:    ${{ secrets.SUPPLIER_PRICE_FEED }}
          SUPPLIER_CATALOG_FEED:    ${{ secrets.SUPPLIER_CATALOG_FEED }}
          SUPPLIER_FALLBACK_FEED: ${{ secrets.SUPPLIER_FALLBACK_FEED }}
          PRICE_FEED:                ${{ secrets.SUPPLIER_PRICE_FEED }}
          CATALOG_FEED:                ${{ secrets.SUPPLIER_CATALOG_FEED }}
          SUPPLIER_REPO_PATH:     '.'
          SHOPIFY_DOMAIN:       ${{ secrets.SHOPIFY_DOMAIN }}
          SHOPIFY_TOKEN:        ${{ secrets.SHOPIFY_TOKEN }}
          IMPORT_HOOK_SECRET:   ${{ secrets.IMPORT_HOOK_SECRET }}
          VAITTO_HOOK_URL:      https://vaitto.com/api/public/hooks/vaitto-product-import
          # VAITTO_DRY_RUN: '1'
          # LIMIT: '10'
        run: python sync_vaitto.py
