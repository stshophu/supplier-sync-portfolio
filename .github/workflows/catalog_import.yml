name: Supplier Tier 1 — Full Catalog Import

on:
  schedule:
    - cron: "0 3 * * *"        # daily at 03:00 UTC
  workflow_dispatch:
    inputs:
      commit:
        description: "Apply to Shopify (otherwise dry run)"
        type: boolean
        default: false

jobs:
  import:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - name: Run Tier 1 import
        env:
          SHOPIFY_DOMAIN: ${{ secrets.SHOPIFY_DOMAIN }}
          SHOPIFY_TOKEN: ${{ secrets.SHOPIFY_TOKEN }}
          SUPPLIER_LOCATION_ID: ${{ secrets.SUPPLIER_LOCATION_ID }}
          SUPPLIER_PRICE_FEED: ${{ secrets.SUPPLIER_PRICE_FEED }}
          SUPPLIER_CATALOG_FEED: ${{ secrets.SUPPLIER_CATALOG_FEED }}
          # Private URL (e.g. a Google Drive direct-download link) -- not
          # committed to this repo since it's real supplier catalog data.
          SUPPLIER_FALLBACK_FEED: ${{ secrets.SUPPLIER_FALLBACK_FEED }}
        run: |
          if [ "${{ github.event_name == 'schedule' || github.event.inputs.commit == 'true' }}" = "true" ]; then
            python3 catalog_import.py --commit
          else
            python3 catalog_import.py
          fi
